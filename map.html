<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>RapidRelief Emergency Map</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<style>
body { margin:0; font-family:Arial; }

.navbar {
  background:#111;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.navbar a {
  color:white;
  margin-left:15px;
  text-decoration:none;
}

#map {
  height:90vh;
  width:100%;
}

.info-box {
  position:absolute;
  top:80px;
  left:15px;
  background:white;
  padding:12px;
  border-radius:10px;
  z-index:500;
  width:230px;
  font-size:14px;
  color:black;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div class="navbar">
  <h2>🗺 RapidRelief Map</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="report.html">Report</a>
    <a href="dashboard.html">Dashboard</a>
  </div>
</div>

<div class="info-box" id="infoBox">
  <b>🚨 AI Response Status</b><br><br>
  Waiting for report...
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>

/////////////////////////////
// MAP INIT
/////////////////////////////

var map = L.map('map').setView([28.6139, 77.2090], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

/////////////////////////////
// ICONS
/////////////////////////////

const icons = {
  user: L.icon({ iconUrl:'https://maps.google.com/mapfiles/ms/icons/blue-dot.png', iconSize:[32,32]}),
  ambulance: L.icon({ iconUrl:'https://maps.google.com/mapfiles/ms/icons/red-dot.png', iconSize:[32,32]}),
  police: L.icon({ iconUrl:'https://maps.google.com/mapfiles/ms/icons/yellow-dot.png', iconSize:[32,32]}),
  fire: L.icon({ iconUrl:'https://maps.google.com/mapfiles/ms/icons/orange-dot.png', iconSize:[32,32]}),
  ngo: L.icon({ iconUrl:'https://maps.google.com/mapfiles/ms/icons/purple-dot.png', iconSize:[32,32]})
};

/////////////////////////////
// MULTIPLE RESOURCES (REALISTIC)
/////////////////////////////

const ambulances = [
  [28.70,77.10],
  [28.65,77.20],
  [28.60,77.18]
];

const policeUnits = [
  [28.53,77.39],
  [28.55,77.30]
];

const fireStations = [
  [28.45,77.02],
  [28.48,77.05]
];

const ngos = [
  [28.40,77.31],
  [28.42,77.28]
];

/////////////////////////////
// DISTANCE + ETA CALC
/////////////////////////////

function getDistance(a,b){
  return map.distance(a,b)/1000; // km
}

function getETA(distance){
  let speed = 40; // km/h (city avg)
  let time = (distance/speed)*60; // minutes
  return Math.round(time);
}

/////////////////////////////
// FIND NEAREST
/////////////////////////////

function findNearest(list, user){
  let minDist = Infinity;
  let nearest = null;

  list.forEach(loc=>{
    let d = getDistance(user, loc);
    if(d < minDist){
      minDist = d;
      nearest = loc;
    }
  });

  return {nearest, distance:minDist};
}

/////////////////////////////
// ROUTE + MOVEMENT
/////////////////////////////

let routeControl = null;
let movingMarker = null;

function showRoute(start, end, icon, label){

  if(routeControl){
    map.removeControl(routeControl);
  }

  if(movingMarker){
    map.removeLayer(movingMarker);
  }

  movingMarker = L.marker(start, {icon}).addTo(map);

  routeControl = L.Routing.control({
    waypoints:[L.latLng(start), L.latLng(end)],
    createMarker:()=>null,
    addWaypoints:false,
    draggableWaypoints:false,
    show:false
  }).addTo(map);

  routeControl.on('routesfound', function(e){

    let route = e.routes[0];
    let coords = route.coordinates;

    let distance = route.summary.totalDistance / 1000;
    let time = Math.round(route.summary.totalTime / 60);

    document.getElementById("infoBox").innerHTML =
    `<b>🚨 ${label} Dispatched</b><br><br>
     📏 Distance: ${distance.toFixed(2)} km<br>
     ⏱ ETA: ${time} minutes<br>
     🚑 AI Optimized Route Active`;

    let i=0;

    let interval = setInterval(()=>{
      if(i>=coords.length){
        clearInterval(interval);
        return;
      }
      movingMarker.setLatLng([coords[i].lat, coords[i].lng]);
      i++;
    },40);

  });
}

/////////////////////////////
// HANDLE REPORT
/////////////////////////////

function handleReport(type, user){

  L.marker(user, {icon:icons.user}).addTo(map);
  map.setView(user,13);

  if(type==="medical"){
    let res = findNearest(ambulances, user);
    showRoute(res.nearest, user, icons.ambulance, "Ambulance");
  }

  else if(type==="accident"){
    let res = findNearest(policeUnits, user);
    showRoute(res.nearest, user, icons.police, "Police");
  }

  else if(type==="fire"){
    let res = findNearest(fireStations, user);
    showRoute(res.nearest, user, icons.fire, "Fire Unit");
  }

  else if(type==="food" || type==="shelter"){
    let res = findNearest(ngos, user);
    showRoute(res.nearest, user, icons.ngo, "NGO Support");
  }
}

/////////////////////////////
// LOAD FROM REPORT
/////////////////////////////

window.onload = function(){

  let data = JSON.parse(localStorage.getItem("latestReport"));

  if(data){
    handleReport(data.type, data.userLocation);
  }
};

</script>

</body>
</html>
