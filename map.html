<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RapidRelief Emergency Map</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- CSS -->
<link rel="stylesheet" href="style.css">

<style>
body {
  margin: 0;
  font-family: Arial;
}

.navbar {
  background: #111;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

.navbar a {
  color: white;
  margin-left: 15px;
  text-decoration: none;
}

#map {
  height: 85vh;
  width: 100%;
}

/* Info Box */
.info-box {
  position: absolute;
  top: 80px;
  left: 15px;
  background: white;
  padding: 12px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  z-index: 5;
  width: 220px;
  font-size: 14px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2>🗺 RapidRelief Map</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="report.html">Report</a>
    <a href="dashboard.html">Dashboard</a>
  </div>
</div>

<!-- INFO BOX -->
<div class="info-box">
  <b>🚨 Nearby Help Status</b><br><br>
  🚑 Ambulance: 4 min<br>
  🏥 Hospital: 7 min<br>
  🚒 Fire Truck: 6 min<br>
  🤝 NGO: 5 min<br>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- MAIN SCRIPT -->
<script>
function initMap() {

  const userLocation = { lat: 28.6139, lng: 77.2090 };

  const map = new google.maps.Map(document.getElementById("map"), {
    zoom: 13,
    center: userLocation
  });

  // USER MARKER
  new google.maps.Marker({
    position: userLocation,
    map: map,
    title: "You are here",
    icon: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png"
  });

  // SERVICES DATA (merged from both codes)
  const services = [
    {
      name: "City Hospital",
      type: "Hospital",
      pos: { lat: 28.6200, lng: 77.2300 },
      eta: "7 min",
      icon: "https://maps.google.com/mapfiles/ms/icons/red-dot.png"
    },
    {
      name: "Ambulance Unit A1",
      type: "Ambulance",
      pos: { lat: 28.6100, lng: 77.2000 },
      eta: "4 min",
      icon: "https://maps.google.com/mapfiles/ms/icons/green-dot.png"
    },
    {
      name: "Fire Station",
      type: "Fire",
      pos: { lat: 28.6000, lng: 77.2150 },
      eta: "6 min",
      icon: "https://maps.google.com/mapfiles/ms/icons/orange-dot.png"
    },
    {
      name: "Police Station",
      type: "Police",
      pos: { lat: 28.6150, lng: 77.2050 },
      eta: "5 min",
      icon: "https://maps.google.com/mapfiles/ms/icons/yellow-dot.png"
    },
    {
      name: "Red Cross NGO",
      type: "NGO",
      pos: { lat: 28.6250, lng: 77.2100 },
      eta: "5 min",
      icon: "https://maps.google.com/mapfiles/ms/icons/purple-dot.png"
    }
  ];

  // ADD MARKERS WITH INFO WINDOWS
  services.forEach(service => {

    const marker = new google.maps.Marker({
      position: service.pos,
      map: map,
      title: service.name,
      icon: service.icon
    });

    const infoWindow = new google.maps.InfoWindow({
      content: `
        <div style="font-family:Arial;">
          <h3>${service.name}</h3>
          <p>Type: ${service.type}</p>
          <b>⏱ Arrival Time: ${service.eta}</b>
        </div>
      `
    });

    marker.addListener("click", () => {
      infoWindow.open(map, marker);
    });

  });

}
</script>

<!-- GOOGLE MAPS API (ONLY ONCE) -->
<script async defer
src="https://maps.googleapis.com/maps/api/js?AIzaSyAitUqIl09ZDMD7zzLI3NAfdpj5WvgbjeE&callback=initMap">
</script>

<!-- OPTIONAL JS FILE -->
<script src="script.js"></script>

</body>
</html>
