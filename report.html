<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Report Emergency - RapidRelief</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

<style>

/* SAME DESIGN (UNCHANGED) */
body{
margin:0;
font-family:Arial, sans-serif;
min-height:100vh;
background: radial-gradient(circle at top left, #dbeafe, transparent 40%),
            radial-gradient(circle at bottom right, #fde2e4, transparent 40%),
            linear-gradient(135deg, #eef2ff, #f8fafc);
overflow-x:hidden;
position:relative;
}

body::before,
body::after{
content:"";
position:absolute;
border-radius:50%;
filter:blur(60px);
z-index:-1;
opacity:0.6;
}

body::before{
width:300px;
height:300px;
background:#1877f2;
top:10%;
left:5%;
}

body::after{
width:350px;
height:350px;
background:#ff6b6b;
bottom:10%;
right:5%;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:rgba(24,119,242,0.9);
backdrop-filter:blur(10px);
color:white;
position:sticky;
top:0;
}

.navbar a{
color:white;
text-decoration:none;
margin-left:15px;
font-weight:bold;
padding:6px 10px;
border-radius:6px;
}

.navbar a:hover{
background:rgba(255,255,255,0.2);
}

h2{
text-align:center;
margin-top:25px;
color:#1c1e21;
}

.form{
width:380px;
margin:40px auto;
padding:25px;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(12px);
border-radius:16px;
box-shadow:0 12px 35px rgba(0,0,0,0.15);
display:flex;
flex-direction:column;
gap:10px;
}

.form label{
font-size:14px;
font-weight:bold;
color:#333;
margin-top:8px;
}

.form input,
.form select,
.form textarea{
padding:10px;
border:1px solid #ddd;
border-radius:8px;
outline:none;
font-size:14px;
}

.form textarea{
resize:none;
height:90px;
}

.form button{
margin-top:15px;
padding:12px;
background:linear-gradient(135deg,#1877f2,#4f8cff);
color:white;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.success{
text-align:center;
color:green;
font-weight:bold;
margin-top:10px;
display:none;
}

</style>

</head>

<body>

<div class="navbar">
<h2>🚨 RapidRelief</h2>
<div>
<a href="index.html">Home</a>
<a href="report.html">Report</a>
<a href="map.html">Map</a>
<a href="dashboard.html">Dashboard</a>
</div>
</div>

<h2>Emergency Reporting Interface</h2>

<form class="form" onsubmit="submitReport(event)">

<label>Name</label>
<input type="text" id="name" required>

<label>Place</label>
<input type="text" id="place" required>

<label>Emergency Type</label>
<select id="type">
<option value="accident">Accident</option>
<option value="medical">Medical</option>
<option value="fire">Fire</option>
<option value="food">Food</option>
<option value="shelter">Shelter</option>
</select>

<label>Description</label>
<textarea id="desc"></textarea>

<button type="submit">Submit Emergency</button>

<p id="successMsg" class="success">
✅ Emergency Report Submitted Successfully
</p>

</form>

<script src="script.js"></script>

<script>

//////////////////////////////////////////////////
// 🚀 SUBMIT REPORT (CONNECTED TO MAP)
//////////////////////////////////////////////////

function submitReport(e){
    e.preventDefault();

    let name = document.getElementById("name").value;
    let place = document.getElementById("place").value;
    let type = document.getElementById("type").value;
    let desc = document.getElementById("desc").value;

    // Convert place → coordinates (TEMP RANDOM for hackathon demo)
    let userLocation = [
        28.5 + Math.random()*0.3,
        77.1 + Math.random()*0.3
    ];

    // Save to localStorage (so map page can read)
   let report = { name, place, type, desc, userLocation };

// GET OLD REPORTS
let reports = JSON.parse(localStorage.getItem("reports")) || [];

// ADD NEW REPORT
reports.push(report);

// SAVE ALL REPORTS
localStorage.setItem("reports", JSON.stringify(reports));

// SAVE LATEST REPORT FOR MAP
localStorage.setItem("latestReport", JSON.stringify(report));

    // Show success
    document.getElementById("successMsg").style.display = "block";

    // Redirect to map after 1.5 sec
    setTimeout(()=>{
        window.location.href = "map.html";
    },1500);
}

</script>

</body>
</html>
