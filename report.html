<!DOCTYPE html>
<html>
<head>

<title>Report Emergency</title>

<link rel="stylesheet" href="style.css">

<style>

/* ===== GLOBAL BACKGROUND ===== */
body{
margin:0;
font-family:Arial, sans-serif;
min-height:100vh;
background: radial-gradient(circle at top left, #dbeafe, transparent 40%),
            radial-gradient(circle at bottom right, #fde2e4, transparent 40%),
            linear-gradient(135deg, #eef2ff, #f8fafc);
overflow-x:hidden;
position:relative;
}

/* Floating background shapes */

body::before,
body::after{
content:"";
position:absolute;
border-radius:50%;
filter:blur(60px);
z-index:-1;
opacity:0.6;
}

body::before{
width:300px;
height:300px;
background:#1877f2;
top:10%;
left:5%;
}

body::after{
width:350px;
height:350px;
background:#ff6b6b;
bottom:10%;
right:5%;
}

/* ===== NAVBAR ===== */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:rgba(24,119,242,0.9);
backdrop-filter:blur(10px);
color:white;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
position:sticky;
top:0;
}

.navbar h2{
margin:0;
font-size:20px;
}

.navbar a{
color:white;
text-decoration:none;
margin-left:15px;
font-weight:bold;
padding:6px 10px;
border-radius:6px;
transition:0.3s;
}

.navbar a:hover{
background:rgba(255,255,255,0.2);
}

/* ===== PAGE TITLE ===== */

h2{
text-align:center;
margin-top:25px;
color:#1c1e21;
}

/* ===== FORM CARD ===== */

.form{
width:380px;
margin:40px auto;
padding:25px;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(12px);
border-radius:16px;
box-shadow:0 12px 35px rgba(0,0,0,0.15);
display:flex;
flex-direction:column;
gap:10px;
border:1px solid rgba(255,255,255,0.4);
}

/* LABELS */

.form label{
font-size:14px;
font-weight:bold;
color:#333;
margin-top:8px;
}

/* INPUTS */

.form input,
.form select,
.form textarea{
padding:10px;
border:1px solid #ddd;
border-radius:8px;
outline:none;
font-size:14px;
transition:0.3s;
background:white;
}

.form input:focus,
.form select:focus,
.form textarea:focus{
border-color:#1877f2;
box-shadow:0 0 8px rgba(24,119,242,0.3);
}

.form textarea{
resize:none;
height:80px;
}

/* BUTTON */

.form button{
margin-top:15px;
padding:12px;
background:linear-gradient(135deg,#1877f2,#4f8cff);
color:white;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.form button:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(24,119,242,0.3);
}

/* SUCCESS MESSAGE */

.success{
display:none;
text-align:center;
color:green;
font-weight:bold;
margin-top:15px;
}

/* MOBILE */

@media (max-width:500px){

.form{
width:90%;
}

}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<h2>🚨 RapidRelief</h2>

<div>
<a href="index.html">Home</a>
<a href="report.html">Report</a>
<a href="map.html">Map</a>
<a href="dashboard.html">Dashboard</a>
</div>

</div>


<h2>Emergency Reporting Interface</h2>

<!-- FORM -->

<form class="form" onsubmit="submitReport(event)">

<label>Name</label>
<input type="text" placeholder="Enter your name" required>

<label>Place</label>
<input type="text" placeholder="Enter location" required>

<label>Emergency Type</label>

<select>

<option>Accident</option>
<option>Food</option>
<option>Medical</option>
<option>Disaster</option>
<option>Fire</option>
<option>Shelter</option>

</select>

<label>Description</label>

<textarea placeholder="Describe emergency"></textarea>



<button type="submit">Submit Emergency</button>

<p id="successMsg" class="success">
✅ Emergency Report Submitted Successfully
</p>

</form>

<script src="script.js"></script>

</body>
</html>
